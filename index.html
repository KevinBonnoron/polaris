<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polaris</title>
</head>

<body>
  <script>
    (() => {
      try {
        const key = localStorage.getItem('polaris:theme') || 'classic-dark';
        const root = document.documentElement;
        root.classList.add(`theme-${key}`);
        const lightThemes = ['classic-light', 'catppuccin-latte', 'solarized-light'];
        if (lightThemes.indexOf(key) !== -1) { root.classList.remove('dark'); }
        else { root.classList.add('dark'); }
      } catch (_e) {}
    })();
  </script>
  <style>
    #polaris-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 200ms ease-out;
    }
    .dark #polaris-splash { background: #0a0a0a; }
    #polaris-splash.is-hidden { opacity: 0; pointer-events: none; }
    #polaris-splash .spinner {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(127, 127, 127, 0.25);
      border-top-color: rgba(127, 127, 127, 0.9);
      animation: polaris-spin 0.8s linear infinite;
    }
    @keyframes polaris-spin { to { transform: rotate(360deg); } }
  </style>
  <div id="root"></div>
  <div id="polaris-splash"><div class="spinner"></div></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
