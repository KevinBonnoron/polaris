name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  bindings:
    name: Generate bindings
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.102
      - name: Generate bindings
        run: wails3 generate bindings -ts -clean
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bindings
          path: frontend/bindings
          if-no-files-found: error

  build:
    name: Build (${{ matrix.name }})
    needs: bindings
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux, os: ubuntu-24.04, goos: linux, cgo: "1", asset: polaris-linux-amd64, ldflags: "-w -s" }
          - { name: windows, os: windows-latest, goos: windows, cgo: "0", asset: polaris-windows-amd64.exe, ldflags: "-w -s -H windowsgui" }
          - { name: macos, os: macos-latest, goos: darwin, cgo: "1", asset: polaris-macos-arm64, ldflags: "-w -s" }
    env:
      GOOS: ${{ matrix.goos }}
      CGO_ENABLED: ${{ matrix.cgo }}
      INPUT_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bindings
          path: frontend/bindings
      - name: Install Linux build deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Build
        shell: bash
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          version="${tag#v}"
          go build -tags production -trimpath -buildvcs=false \
            -ldflags "${{ matrix.ldflags }} -X github.com/KevinBonnoron/polaris/internal/polaris.Version=${version}" \
            -o "${{ matrix.asset }}" .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve tag
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            Polaris is also available as a Nix flake:

            ```
            nix profile install github:${{ github.repository }}
            ```
