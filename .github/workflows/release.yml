name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-24.04
            build_args: -tags webkit2_41
            binary: polaris
            asset_name: polaris-linux-amd64
          - name: windows
            os: windows-latest
            build_args: ""
            binary: polaris.exe
            asset_name: polaris-windows-amd64.exe
          - name: macos
            os: macos-latest
            build_args: -platform darwin/universal
            binary: polaris.app
            asset_name: polaris-macos-universal.zip

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Linux build deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libnss3

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build
        shell: bash
        run: |
          wails build ${{ matrix.build_args }} \
            -ldflags "-X github.com/KevinBonnoron/polaris/internal/polaris.Version=${{ steps.version.outputs.version }}"

      - name: Package macOS .app
        if: matrix.name == 'macos'
        shell: bash
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent polaris.app ../../${{ matrix.asset_name }}

      - name: Stage Linux/Windows binary
        if: matrix.name != 'macos'
        shell: bash
        run: cp "build/bin/${{ matrix.binary }}" "${{ matrix.asset_name }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
