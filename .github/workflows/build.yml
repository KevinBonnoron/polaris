name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-24.04
            build_args: -tags webkit2_41
            artifact_path: build/bin/polaris
          - name: windows
            os: windows-latest
            build_args: ""
            artifact_path: build/bin/polaris.exe
          - name: macos
            os: macos-latest
            build_args: -platform darwin/universal
            artifact_path: build/bin/polaris.app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Linux build deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libnss3

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build
        shell: bash
        run: wails build ${{ matrix.build_args }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
