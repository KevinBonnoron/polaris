name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default: every job only reads the repo. The artifact
# upload/download steps use the Actions artifact backend, not GITHUB_TOKEN
# scopes, so they work fine under contents: read.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      # The Go side (internal/...) needs no GTK/Wails/bindings — those are
      # frontend/GUI concerns covered by the build job.
      - name: Vet
        run: go vet ./internal/...
      - name: Test
        run: go test -race ./internal/...

  bindings:
    name: Generate bindings
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install wails3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.102
      - name: Generate bindings
        run: wails3 generate bindings -ts -clean
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bindings
          path: frontend/bindings
          if-no-files-found: error

  build:
    name: Build (${{ matrix.name }})
    needs: bindings
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux, os: ubuntu-24.04, goos: linux, cgo: "1", bin: polaris, ldflags: "-w -s" }
          - { name: windows, os: windows-latest, goos: windows, cgo: "0", bin: polaris.exe, ldflags: "-w -s -H windowsgui" }
          - { name: macos, os: macos-latest, goos: darwin, cgo: "1", bin: polaris, ldflags: "-w -s" }
    env:
      GOOS: ${{ matrix.goos }}
      CGO_ENABLED: ${{ matrix.cgo }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bindings
          path: frontend/bindings
      - name: Install Linux build deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Build
        shell: bash
        run: go build -tags production -trimpath -buildvcs=false -ldflags "${{ matrix.ldflags }}" -o "build/bin/${{ matrix.bin }}" .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: polaris-${{ matrix.name }}
          path: build/bin/${{ matrix.bin }}
          if-no-files-found: error

  nix:
    name: Build (nix, linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build (nix)
        run: nix build -L
