commit-msg:
  commands:
    conventional:
      run: bash scripts/check-commit-msg.sh {1}

pre-commit:
  parallel: false
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    vet:
      glob: "*.go"
      run: go vet ./...
